databases:
  - name: terrier-scheduler-db
    databaseName: terrier_scheduler
    user: terrier_scheduler

services:
  - type: web
    name: terrier-scheduler
    env: ruby
    buildCommand: bundle install && bin/rails db:migrate:all && bin/rake import:all
    startCommand: bin/rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: terrier-scheduler-db
          property: connectionString
